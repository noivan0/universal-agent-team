# Universal Agent Team v1 Configuration
# =========================================
# This file defines the default agent team used when no custom team is
# specified. Edit here to add/remove agents or change dependency edges
# without modifying Python code.

team_id: "universal-agents-v1"
name: "Universal Agent Team v1"
description: "Default team with support for React + FastAPI, and other stacks"
spec_location: "/workspace/agents"

allow_parallel_execution: true
max_retries: 3
checkpoint_enabled: true

agents:
  # ── Brainstorming Phase (all 6 run in parallel, synthesis is serial) ──────
  - agent_id: "brainstorming_planning"
    role: "planning"
    spec_file: "{spec_location}/00-brainstorming-agent.md"
    description: "Pre-brainstorm from requirements and planning perspective"
    phase: "brainstorming"
    specializations: []

  - agent_id: "brainstorming_architecture"
    role: "architecture"
    spec_file: "{spec_location}/00-brainstorming-agent.md"
    description: "Pre-brainstorm from architecture and system design perspective"
    phase: "brainstorming"
    specializations: []

  - agent_id: "brainstorming_frontend"
    role: "frontend"
    spec_file: "{spec_location}/00-brainstorming-agent.md"
    description: "Pre-brainstorm from frontend and UI/UX perspective"
    phase: "brainstorming"
    specializations: []

  - agent_id: "brainstorming_backend"
    role: "backend"
    spec_file: "{spec_location}/00-brainstorming-agent.md"
    description: "Pre-brainstorm from backend and API design perspective"
    phase: "brainstorming"
    specializations: []

  - agent_id: "brainstorming_qa"
    role: "qa"
    spec_file: "{spec_location}/00-brainstorming-agent.md"
    description: "Pre-brainstorm from testing and quality perspective"
    phase: "brainstorming"
    specializations: []

  - agent_id: "brainstorming_documentation"
    role: "documentation"
    spec_file: "{spec_location}/00-brainstorming-agent.md"
    description: "Pre-brainstorm from documentation perspective"
    phase: "brainstorming"
    specializations: []

  - agent_id: "brainstorming_synthesis"
    role: "synthesis"
    spec_file: "{spec_location}/00-brainstorming-agent.md"
    description: "Synthesize all brainstorming perspectives into collective consensus"
    phase: "brainstorming"
    specializations: []

  # ── Main Workflow ─────────────────────────────────────────────────────────
  - agent_id: "planning"
    role: "planning"
    spec_file: "{spec_location}/01-planning-agent.md"
    description: "Analyze requirements and break into tasks"
    specializations: []

  - agent_id: "architecture"
    role: "architecture"
    spec_file: "{spec_location}/02-architecture-agent.md"
    description: "Design system architecture and specs"
    specializations: []

  - agent_id: "frontend"
    role: "frontend"
    spec_file: "{spec_location}/03-frontend-agent.md"
    description: "Generate frontend code"
    specializations:
      - "react"
      - "react-native"
      - "vue"
      - "svelte"

  - agent_id: "backend"
    role: "backend"
    spec_file: "{spec_location}/04-backend-agent.md"
    description: "Generate backend code"
    specializations:
      - "fastapi"
      - "node-express"
      - "django"
      - "go"

  - agent_id: "contract_validator"
    role: "validation"
    spec_file: "{spec_location}/07-contract-validator-agent.md"
    description: "Validate API contracts"
    specializations: []

  - agent_id: "qa"
    role: "qa"
    spec_file: "{spec_location}/05-backtesting-qa-agent.md"
    description: "Test and validate code"
    specializations: []

  - agent_id: "documentation"
    role: "documentation"
    spec_file: "{spec_location}/06-documentation-agent.md"
    description: "Generate documentation"
    specializations: []

# Dependency graph: {agent_id: [depends_on_agent_ids]}
# Agents with no dependencies run first.
# Brainstorming agents (6) run in parallel; synthesis runs after all 6 complete.
# Main workflow agents depend on brainstorming_synthesis completing first.
dependencies:
  # Brainstorming phase — all 6 domain agents run in parallel (no deps)
  brainstorming_planning: []
  brainstorming_architecture: []
  brainstorming_frontend: []
  brainstorming_backend: []
  brainstorming_qa: []
  brainstorming_documentation: []
  # Synthesis waits for all 6 brainstorming agents
  brainstorming_synthesis:
    - brainstorming_planning
    - brainstorming_architecture
    - brainstorming_frontend
    - brainstorming_backend
    - brainstorming_qa
    - brainstorming_documentation
  # Main workflow: planning depends on synthesis output
  planning:
    - brainstorming_synthesis
  architecture:
    - planning
  contract_validator:
    - architecture
  frontend:
    - architecture
    - contract_validator
  backend:
    - architecture
    - contract_validator
  qa:
    - frontend
    - backend
  documentation:
    - planning
    - architecture
    - frontend
    - backend
    - qa
