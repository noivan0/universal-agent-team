version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: cycle_monitor_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cycle_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cycle_monitor_network

  redis:
    image: redis:7-alpine
    container_name: cycle_monitor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cycle_monitor_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cycle_monitor_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cycle_monitor
      - REDIS_URL=redis://redis:6379
      - API_HOST=http://localhost:8000
      - FRONTEND_URL=http://localhost:3000
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - cycle_monitor_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cycle_monitor_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - cycle_monitor_network

volumes:
  postgres_data:
  redis_data:

networks:
  cycle_monitor_network:
    driver: bridge
